<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Shizen</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #111;
      color: #fff;
    }

    .dashboard {
      display: grid;
      grid-template-columns: 250px 1fr;
      height: 100vh;
    }

    /* SIDEBAR */
    .sidebar {
      background: #1c1c1c;
      padding: 20px;
    }

    .sidebar h2 {
      color: #f4a261;
    }

    .sidebar ul {
      list-style: none;
      padding: 0;
    }

    .sidebar ul li {
      margin: 20px 0;
      cursor: pointer;
    }

    .sidebar ul li:hover {
      color: #f4a261;
    }

    /* MAIN */
    .main {
      padding: 20px;
      overflow-y: auto;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1c1c1c;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    }

    .card h3 {
      color: #f4a261;
    }

    .table {
      margin-top: 30px;
      width: 100%;
      border-collapse: collapse;
    }

    .table th, .table td {
      padding: 10px;
      border-bottom: 1px solid #333;
      text-align: left;
    }

    .status {
      padding: 5px 10px;
      border-radius: 10px;
      font-size: 12px;
    }

    .pendiente { background: orange; }
    .proceso { background: blue; }
    .entregado { background: green; }

    canvas {
      margin-top: 30px;
      background: #1c1c1c;
      padding: 10px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<div class="dashboard">

  <div class="sidebar">
    <h2>Admin</h2>
    <ul>
      <li>Dashboard</li>
      <li>Pedidos</li>
      <li>Productos</li>
      <li>Clientes</li>
    </ul>
  </div>

  <div class="main">
    <h1>Resumen General</h1>

    <div class="cards">
      <div class="card">
        <h3>Ventas Hoy</h3>
        <p>S/ 1,250</p>
      </div>
      <div class="card">
        <h3>Pedidos</h3>
        <p>32</p>
      </div>
      <div class="card">
        <h3>Clientes</h3>
        <p>120</p>
      </div>
      <div class="card">
        <h3>Producto Top</h3>
        <p>Pollo a la Brasa</p>
      </div>
    </div>

    <canvas id="ventasChart"></canvas>

    <table class="table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Cliente</th>
          <th>Total</th>
          <th>Estado</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>#001</td>
          <td>Juan Pérez</td>
          <td>S/ 45</td>
          <td><span class="status pendiente">Pendiente</span></td>
        </tr>
        <tr>
          <td>#002</td>
          <td>Ana Torres</td>
          <td>S/ 80</td>
          <td><span class="status proceso">En proceso</span></td>
        </tr>
        <tr>
          <td>#003</td>
          <td>Carlos Ruiz</td>
          <td>S/ 60</td>
          <td><span class="status entregado">Entregado</span></td>
        </tr>
      </tbody>
    </table>
  </div>

</div>

<script>
  const ctx = document.getElementById('ventasChart');
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes'],
      datasets: [{
        label: 'Ventas (S/)',
        data: [200, 400, 300, 500, 700]
      }]
    }
  });
</script>

</body>
</html>
