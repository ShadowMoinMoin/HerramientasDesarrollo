<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservas</title>
    <link rel="shortcut icon" href="Favicon/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.2/css/all.min.css"
        integrity="sha512-1sCRPdkRXhBV2PBLUdRb4tMg1w2YPf37qatUFeS7zlBy7jJI8Lf4VHwWfZZfpXtYSLy85pkm9GaYVYMfw5BC1A=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="Estilos/Styles.css">
</head>

<body>
    <header>
        <nav class="navbar">
            <h1 class="logo">Los Pollos Vecinos</h1>
            <ul class="menu">
                <li><a href="Principal.html">Inicio</a></li>
                <li><a href="Menu.html">Menú</a></li>
                <li><a href="Nosotros.html">Nosotros</a></li>
                <li><a href="Reservas.html">Reservas</a></li>
                <li><a href="Contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>
    <section class="reservations">
        <h2>Reserva tu mesa</h2>

        <div class="reserva-form">
            <input type="date" id="fecha">
            <input type="time" id="hora">
            <select id="personas">
                <option value="2">2 personas</option>
                <option value="4">4 personas</option>
                <option value="6">6 personas</option>
            </select>
        </div>

        <div class="mapa-mesas">

            <div class="mesa disponible" data-id="1" data-capacidad="2">
                <svg viewBox="0 0 100 100">
                    <rect x="20" y="30" width="60" height="40" rx="10" />
                    <circle cx="50" cy="15" r="8" />
                    <circle cx="50" cy="85" r="8" />
                </svg>
            </div>

            <div class="mesa ocupada" data-id="2" data-capacidad="4">
                <svg viewBox="0 0 100 100">
                    <rect x="15" y="25" width="70" height="50" rx="10" />
                    <circle cx="50" cy="10" r="7" />
                    <circle cx="50" cy="90" r="7" />
                    <circle cx="10" cy="50" r="7" />
                    <circle cx="90" cy="50" r="7" />
                </svg>
            </div>

            <div class="mesa disponible" data-id="3" data-capacidad="4">
                <svg viewBox="0 0 100 100">
                    <rect x="15" y="25" width="70" height="50" rx="10" />
                    <circle cx="50" cy="10" r="7" />
                    <circle cx="50" cy="90" r="7" />
                    <circle cx="10" cy="50" r="7" />
                    <circle cx="90" cy="50" r="7" />
                </svg>
            </div>

            <div class="mesa reservada" data-id="4" data-capacidad="6">
                <svg viewBox="0 0 100 100">
                    <rect x="15" y="25" width="70" height="50" rx="10" />
                    <circle cx="25" cy="10" r="6" />
                    <circle cx="75" cy="10" r="6" />
                    <circle cx="5" cy="50" r="6" />
                    <circle cx="95" cy="50" r="6" />
                    <circle cx="25" cy="90" r="6" />
                    <circle cx="75" cy="90" r="6" />
                </svg>
            </div>

        </div>

        <button class="btn" id="confirmar">Confirmar reserva</button>
    </section>
    <footer>
        <div class="container">
            <ul>
                <li style="--clr: #1877f2">
                    <a data-url="#">
                        <i class="fa-brands fa-facebook-f"></i>
                    </a>
                </li>
                <li style="--clr: #ff0000">
                    <a data-url="#">
                        <i class="fa-brands fa-youtube"></i>
                    </a>
                </li>
                <li style="--clr: #1da1f2">
                    <a data-url="#">
                        <i class="fa-brands fa-twitter"></i>
                    </a>
                </li>
                <li style="--clr: #c32aa3">
                    <a data-url="#">
                        <i class="fa-brands fa-instagram"></i>
                    </a>
                </li>
                <li style="--clr: #25d366">
                    <a data-url="#">
                        <i class="fa-brands fa-whatsapp"></i>
                    </a>
                </li>
            </ul>
        </div>
    </footer>
    <script src="JavaScript/Mesas.js"></script>
</body>

</html>
